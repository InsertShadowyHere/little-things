<!DOCTYPE html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Music Thingy</title>
</head>
<body>
    <button onclick="load()">Load</button>
    <input type="file" id="imp">
    <br>
    Show Middle C: <input id="togC" checked onclick="toggle('C')" type="checkbox">
    Show Barlines: <input id="togBarl" checked onclick="toggle('barlines')" type="checkbox">
    Show All Notes: <input id="togNotes" checked onclick="toggle('notes')" type="checkbox">
    Show Outline: <input id="togOut" onclick="toggle('outline')" type="checkbox">
    <br>
    Circle-sized Note: <select id="circleNote" onchange="setCircle()"></select> 
    Bar Length: <input onchange="toggle()" type="number" class="num-inp" min="1" max="12" value="4" id="barlNum"> <select onchange="toggle()" id="barlType"></select> 
    First Measure Number: <input id='barNum' value="1" type="number" min="1" class="num-inp" onchange="toggle()">
    Bars: <input id='barCt' value="30" type="number" min="1" class="num-inp" onchange="setBarCt()">
    <div class='main-layout'>
        <div class="voices-list">

        </div>
        <div class="wrapper" id="wrapper">
            <canvas id="bcv"></canvas>
            <canvas id="cv"></canvas>
        </div>
    </div>
    <br><button onclick="exportImg()">Export</button>
    <!-- create container to store voices and their colors -->
     <div></div>
    <script src="index.js"></script>
</body>
