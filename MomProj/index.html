<!DOCTYPE html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Music Thingy</title>
</head>
<body>
    <input type="file" id="imp">
    <br><button onclick="load()">Load</button>
    Show Middle C: <input id="togC" onclick="toggle('C')" type="checkbox">
    Show Barlines: <input id="togBarl" onclick="toggle('barlines')" type="checkbox">
    Show All Notes: <input id="togNotes" onclick="toggle('notes')" type="checkbox">
    Show Outline: <input id="togOut" onclick="toggle('outline')" type="checkbox">
    <div class='main-layout'>
        <div class="voices-list">

        </div>
        <div class="wrapper">
            <canvas id="bcv"></canvas>
            <canvas id="cv"></canvas>
        </div>
    </div>
    <br><button onclick="exportImg()">Export</button>
    <!-- create container to store voices and their colors -->
     <div></div>
    <script src="index.js"></script>
</body>
